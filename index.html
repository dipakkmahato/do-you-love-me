<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do You Love Me? 💖</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- Cinematic Sealed Envelope Overlay -->
  <div id="envelope-overlay">
    <div class="envelope-intro-text" id="envelope-typewriter"></div>
    <div class="envelope-wrapper">
      <div class="envelope-back"></div>
      <div class="envelope-flap"></div>
      <div class="envelope-left-flap"></div>
      <div class="envelope-right-flap"></div>
      <div class="envelope-bottom-flap"></div>
      <div class="envelope-letter">
        <h3>To My Favorite Person</h3>
        <p>You have a secret letter inside. Click the red seal to open... 🌸</p>
      </div>
      <div class="wax-seal">💌</div>
    </div>
  </div>

  <!-- Floating background particles -->
  <div id="particles-container"></div>

  <!-- Dynamic Music Controller Widget -->
  <div class="music-widget">
    <button class="music-btn" id="music-toggle-btn" aria-label="Toggle Music">🔇</button>
    <div class="music-details">
      <span class="music-title-text" id="music-track-title">🎵 Music Box Arpeggio</span>
      <button class="track-skip-btn" id="music-skip-btn" title="Next Song">⏭️</button>
      <input type="range" class="volume-slider" id="music-volume" min="0" max="1" step="0.1" value="0.6" aria-label="Volume">
    </div>
    <div class="music-tooltip">Play Sweet Music 🎵</div>
  </div>

  <div class="container">
    <!-- Sweet decorative ribbon -->
    <div class="ribbon">To My Favorite Person 🌸</div>

    <!-- Generated couple illustration frame -->
    <div class="illustration-frame">
      <img src="./couple_illustration.png" alt="Cute Chibi Couple" onerror="this.outerHTML='<div class=\"illustration-placeholder\">🧸💕</div>'" />
    </div>

    <!-- Cute Tenor GIF embed -->
    <div class="tenor-gif-embed" data-postid="22885016" data-share-method="host" data-aspect-ratio="1.04918" data-width="100%">
      <a href="https://tenor.com/view/manja-gif-22885016">Manja Sticker</a>from
      <a href="https://tenor.com/search/manja-stickers">Manja Stickers</a>
    </div>
    <script type="text/javascript" async src="https://tenor.com/embed.js"></script>

    <!-- Proposal Heading and Text -->
    <h1>Do you love me? 🤗</h1>
    <p>Chiku is all yours, forever and always 💕</p>

    <!-- Navigation Buttons -->
    <div class="btn">
      <a href="yes.html" class="btn-yes">Yes ❤️</a>
      <a href="no1.html" class="btn-no">No 💔</a>
    </div>
  </div>

  <script src="./script.js"></script>
</body>

</html>
