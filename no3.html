<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maan Jao Na! 🥺❤️</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- Floating background particles -->
  <div id="particles-container"></div>

  <!-- Music toggle widget -->
  <div class="music-widget">
    <div class="music-tooltip">Play Sweet Music 🎵</div>
    <button class="music-btn" id="music-toggle-btn" aria-label="Toggle Music">🔇</button>
  </div>

  <!-- Heart redirect overlay -->
  <div id="heart-redirect-overlay">
    <div class="heart-burst-container" id="heart-burst"></div>
    <div class="redirect-message">Taking you back home... 💕</div>
  </div>

  <div class="container">
    <!-- Sweet decorative ribbon -->
    <div class="ribbon">Last Chance! 😭🙏</div>

    <!-- Manja sticker -->
    <div class="sticker-frame" style="animation: stickerBounce 1.4s ease-in-out infinite;">
      <img src="./manja_sticker.png" alt="Pleading sticker" class="manja-sticker" />
    </div>

    <!-- Content -->
    <h1>Baby Man jao na! Kitna bhav khaogi 😭</h1>
    <p>Bhut glt baat hai yrr... 😭💔</p>

    <!-- Navigation Buttons -->
    <div class="btn">
      <a href="yes.html" class="btn-yes">Yes ❤️</a>
      <a href="#" id="move-random" class="btn-no">No 💔</a>
    </div>

    <!-- Divider -->
    <div class="restart-divider">— or —</div>

    <!-- 💞 Try Again button -->
    <button class="btn-tryagain" id="btn-try-again" aria-label="Go back to start">
      <span>💞</span>
      <span class="restart-text">Try Again from Home</span>
      <span>🏠</span>
    </button>
  </div>

  <script src="./script.js"></script>
</body>

</html>
